name: personal_ai_agent
description: Personal AI Agent — chat app untuk Android dan Windows

publish_to: 'none'  # Tidak dipublish ke pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP request ke backend
  http: ^1.2.1

  # Supabase Auth (login & session management)
  supabase_flutter: ^2.5.6

  # Render markdown dari jawaban AI (bold, list, code block, dll)
  flutter_markdown: ^0.7.3

  # Simpan preference lokal (misal: backend URL)
  shared_preferences: ^2.3.1

  # Icon pack tambahan
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Tambahkan font Google di sini kalau mau custom font
